# ============================================================================
# Performance Agent — PR Check
# ============================================================================
#
# Runs automatically on every PR. Performs:
#   1. Commit analysis — collects diff + changed files for review
#   2. Code complexity — static analysis on changed code files
#
# Results are posted as a PR comment and shown in the job summary.
#
# Usage: Drop perf-policy.yaml in your repo root to customize thresholds.
# ============================================================================

name: "Perf Agent: PR Check"

on:
  pull_request:
    branches: [main, develop, release/**]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write  # Needed to post PR comments

concurrency:
  group: perf-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  perf-pr-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need parent commit for diff

      # ── Step 1: Commit Analysis ──────────────────────────────────────────
      - name: "🔍 Commit Analysis"
        id: commit
        uses: ./.github/actions/perf-agent
        with:
          pipeline: commit-analysis

      # ── Step 2: Code Complexity on Changed Files ─────────────────────────
      - name: "📊 Code Complexity (changed files)"
        id: complexity
        uses: ./.github/actions/perf-agent
        with:
          pipeline: code-complexity
          fail-on-critical: 'true'

      # ── Step 3: Post PR Comment ──────────────────────────────────────────
      - name: "💬 Post PR comment"
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const commitSummary = `${{ steps.commit.outputs.summary }}`;
            const complexitySummary = `${{ steps.complexity.outputs.summary }}`;
            const hasCritical = `${{ steps.complexity.outputs.has-critical }}` === 'true';

            const icon = hasCritical ? '🔴' : '🟢';
            const verdict = hasCritical
              ? '**Action Required** — Critical complexity issues found in changed files.'
              : '**All Clear** — No critical issues detected.';

            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const timestamp = new Date().toISOString().replace('T', ' ').substring(0, 19) + ' UTC';

            const body = [
              `## ${icon} Performance Agent — PR Check`,
              '',
              verdict,
              '',
              `> 📌 **Commit:** \`${sha}\` · **Updated:** ${timestamp} · [View run](${runUrl})`,
              '',
              '### 🔍 Commit Analysis',
              commitSummary || '_No data collected_',
              '',
              '### 📊 Code Complexity',
              complexitySummary || '_No data collected_',
              '',
              '---',
              `_🤖 Automated by [Performance Agent](https://github.com/${context.repo.owner}/${context.repo.repo}) · [Configure](perf-policy.yaml)_`,
            ].join('\n');

            // Find existing comment to update (avoid spamming)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user?.type === 'Bot' &&
              c.body?.includes('Performance Agent — PR Check')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # ── Step 4: Upload Reports ───────────────────────────────────────────
      - name: "📁 Upload reports"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-pr-reports
          path: .perf-output/ci-reports/
          retention-days: 30
          if-no-files-found: ignore
